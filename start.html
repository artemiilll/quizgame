<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style_quiz.css') }}">
    <title>Викторина - Старт</title>
</head>
<body>

    <div class="container">

        <h1>Привет, {{ username }}!</h1>

    
        <form method="POST">
            <input type="text" name="name" placeholder="Введите ваше имя" value="{{ username }}">
            <button type="submit" class="btn-green">Запомнить</button>
        </form>

        <hr>

        <h2>Выберите викторину:</h2>
        {% for quiz in quizes %}
            <a href="/test?quiz_id={{ quiz[0] }}" class="quiz-btn">{{ quiz[1] }}</a>
        {% endfor %}
    </div>

</body>
</html>
